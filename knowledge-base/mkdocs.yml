site_name: "Sami's Knowledge Base"
site_description: "个人 & 团队知识管理中心"
site_url: https://YOUR_USERNAME.github.io/knowledge-base/

# ============================
# 主题配置
# ============================
theme:
  name: material
  language: zh
  palette:
    # 浅色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    # 深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

# ============================
# 插件
# ============================
plugins:
  - search:
      lang: zh
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: date
      enable_creation_date: true

# ============================
# Markdown 扩展
# ============================
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ============================
# 导航结构
# ============================
nav:
  - 首页: index.md
  - 🎣 钓鱼与户外:
    - fishing/index.md
    - 钓点资料:
      - fishing/spots/index.md
    - 钓鱼攻略:
      - fishing/guides/index.md
    - 露营指南:
      - outdoor/camping/index.md
  - 🧴 香氛收藏:
    - fragrance/index.md
    - 品牌档案:
      - fragrance/brands/index.md
    - 香评笔记:
      - fragrance/reviews/index.md
    - 选购指南:
      - fragrance/guides/index.md
  - 📋 产品规划:
    - product/index.md
    - 2025 H2: product/2025-h2/index.md
    - 2026 H1: product/2026-h1/index.md
    - 答辩材料: product/review/index.md
  - 💻 技术笔记:
    - tech/index.md
    - MCP 开发: tech/mcp/index.md
    - CloudBase: tech/cloudbase/index.md
    - 小程序: tech/miniprogram/index.md
    - 工具与效率: tech/tools/index.md
  - 🍵 茶文化:
    - tea/index.md
    - 六大茶类: tea/categories/index.md
    - 品鉴笔记: tea/notes/index.md
  - 📈 投资研究:
    - investment/index.md
  - 🔐 安全管理:
    - security/SECURITY.md

# ============================
# 额外配置
# ============================
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YOUR_USERNAME
  generator: false
